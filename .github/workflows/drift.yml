name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to check"
        required: true
        type: string
        default: "production"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Drift Check (${{ matrix.env }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [production]
        component:
          - network
          - cluster
          - cluster-addons
          - cluster-bootstrap
          - dns
          - cost
          - observability
          - secrets
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "0.99.4"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Plan
        id: plan
        working-directory: live/${{ matrix.env }}/${{ matrix.component }}
        run: |
          set +e
          terragrunt plan -detailed-exitcode -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Report drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('live/${{ matrix.env }}/${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;

            const title = `Drift detected: ${{ matrix.env }}/${{ matrix.component }}`;
            const body = `## Drift Detection Report\n\n**Environment:** ${{ matrix.env }}\n**Component:** ${{ matrix.component }}\n**Detected:** ${new Date().toISOString()}\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift'],
              });
            }
